<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar">
        <a class="brand" href="index.html">🎓 Student Enrollment</a>
        <nav>
            <a href="students.html">Students</a>
            <a href="courses.html">Courses</a>
            <a href="enrollments.html" class="active">Enrollments</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Enrollments</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Enroll Student</button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Student</th>
                            <th>Course</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="enrollmentTable">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>Enroll Student</h2>

            <div class="form-group">
                <label>Student</label>
                <select id="studentSelect">
                    <option value="">-- Select Student --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Course</label>
                <select id="courseSelect">
                    <option value="">-- Select Course --</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveEnrollment()">Enroll</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/enrollments.js"></script>
</body>
</html>
