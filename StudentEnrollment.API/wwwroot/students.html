<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar">
        <a class="brand" href="index.html">🎓 Student Enrollment</a>
        <nav>
            <a href="students.html" class="active">Students</a>
            <a href="courses.html">Courses</a>
            <a href="enrollments.html">Enrollments</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Students</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Student</button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add Student</h2>
            <input type="hidden" id="studentId">

            <div class="form-group">
                <label>Name</label>
                <input type="text" id="studentName" placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="studentEmail" placeholder="Enter email">
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveStudent()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/students.js"></script>
</body>
</html>
