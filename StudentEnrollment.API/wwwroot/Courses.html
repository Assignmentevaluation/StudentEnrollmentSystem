<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="navbar">
        <a class="brand" href="index.html">🎓 Student Enrollment</a>
        <nav>
            <a href="students.html">Students</a>
            <a href="courses.html" class="active">Courses</a>
            <a href="enrollments.html">Enrollments</a>
        </nav>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Courses</h1>
            <button class="btn btn-primary" onclick="openAddModal()">+ Add Course</button>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Credits</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="courseTable">
                        <tr><td colspan="4" class="empty-state">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2 id="modalTitle">Add Course</h2>
            <input type="hidden" id="courseId">

            <div class="form-group">
                <label>Title</label>
                <input type="text" id="courseTitle" placeholder="Enter course title">
            </div>
            <div class="form-group">
                <label>Credits</label>
                <input type="number" id="courseCredits" placeholder="Enter credits" min="1">
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveCourse()">Save</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
